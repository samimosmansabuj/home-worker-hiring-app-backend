<!DOCTYPE html>
<html>

<head>
    <title>RightRoutes API</title>
    <style>
        body {
                {
                background: #0f172a;
                color: #ffffff;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
        }

        .card {
                {
                background: #1e293b;
                padding: 40px;
                border-radius: 16px;
                text-align: center;
                box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
            }
        }

        h1 {
                {
                margin-bottom: 10px;
                color: #38bdf8;
            }
        }

        .status {
                {
                color: #22c55e;
                font-weight: bold;
            }
        }

        .time {
                {
                margin-top: 15px;
                color: #cbd5e1;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚀 RightRoutes API</h1>
        <p class="status">Status: Online</p>
        <p>Backend server is running successfully.</p>
        <p class="time">Server Time: {now()}</p>

</body>

</html>
